# Stock Check Bot Configuration

watchlist:
  - AAPL
  - MSFT
  - GOOGL
  - AMZN
  - NVDA
  - META
  - TSLA
  - SPY
  - QQQ

# Signal weights for the composite score (must sum to 1.0)
weights:
  technical:
    macd: 0.10
    golden_death_cross: 0.10
    rsi: 0.08
    bollinger: 0.07
    volume_trend: 0.05
  fundamental:
    earnings_surprise: 0.12
    pe_ratio: 0.08
    revenue_growth: 0.05
    earnings_growth: 0.05
  macro:
    fed_funds_rate: 0.08
    yield_curve: 0.07
    market_trend: 0.05
    vix: 0.05
    sector_rotation: 0.05

# Thresholds for buy/sell/hold decisions
thresholds:
  strong_buy: 0.7
  buy: 0.55
  hold_upper: 0.55
  hold_lower: 0.45
  sell: 0.45
  strong_sell: 0.3

# Backtesting configuration
backtest:
  start_date: "2020-01-01"
  end_date: "2025-12-31"
  initial_capital: 100000
  commission_pct: 0.001
  slippage_pct: 0.001

# Major dip detection
dip_detection:
  daily_drop_pct: -3.0
  weekly_drop_pct: -7.0
  from_high_pct: -15.0
  lookback_days: 252
